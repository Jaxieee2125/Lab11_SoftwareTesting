name: Selenium Test Suite
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [firefox, edge] # Chạy trên cả Chrome và Edge
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
          
      - name: Chạy test (${{ matrix.browser }}) 
        run: mvn test -Dbrowser=${{ matrix.browser }}
        
      - name: Lưu kết quả test
        if: always() # Chạy dù test pass hay fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }} 
          path: |
            target/surefire-reports/
            target/screenshots/